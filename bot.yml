name: GAUSS+DNA Bot de Sinais

on:
  schedule:
    # Roda a cada 15 minutos, 24h por dia, 7 dias por semana
    - cron: '*/15 * * * *'
  workflow_dispatch: # Permite rodar manualmente também

jobs:
  scanner:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install aiohttp

      - name: Rodar scanner de sinais
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHATID: ${{ secrets.TG_CHATID }}
          TIMEFRAME: '15m'
          COOLDOWN: '900'   # 15 minutos entre sinais por moeda (mesmo ciclo)
          RUN_ONCE: 'true'  # Modo de execução única (para GitHub Actions)
        run: python bot_actions.py
