name: Swing H4 — Trend Master Flow

on:
  schedule:
    - cron: '30 */4 * * *'   # a cada 4 horas (offset 30min para não colidir com GAUSS+DNA)
  workflow_dispatch:

concurrency:
  group: swing-h4
  cancel-in-progress: true

jobs:
  swing:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install aiohttp

      - name: Restaurar estado (cooldown 24h)
        uses: actions/cache/restore@v4
        with:
          path: swing_h4_signals.json
          key: swing-h4-${{ github.run_id }}
          restore-keys: swing-h4-

      - name: Verificar credenciais
        env:
          TG_TOKEN:  ${{ secrets.TG_TOKEN }}
          TG_CHATID: ${{ secrets.TG_CHATID }}
        run: |
          if [ -z "$TG_TOKEN" ] || [ -z "$TG_CHATID" ]; then
            echo "❌ TG_TOKEN ou TG_CHATID não configurado!"
            exit 1
          fi
          echo "✅ Credenciais OK"

      - name: Rodar Swing H4
        env:
          TG_TOKEN:  ${{ secrets.TG_TOKEN }}
          TG_CHATID: ${{ secrets.TG_CHATID }}
          CAPITAL:   ${{ vars.CAPITAL || '100' }}
        run: python swing_h4.py

      - name: Salvar estado
        if: always()
        uses: actions/cache/save@v4
        with:
          path: swing_h4_signals.json
          key: swing-h4-${{ github.run_id }}
