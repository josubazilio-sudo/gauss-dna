name: GAUSS+DNA Watchlist Check

on:
  workflow_dispatch:
    inputs:
      timeframe:
        description: 'Timeframe (30m ou 1h)'
        required: false
        default: '30m'

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install aiohttp

      - name: Verificar credenciais
        env:
          TG_TOKEN:  ${{ secrets.TG_TOKEN }}
          TG_CHATID: ${{ secrets.TG_CHATID }}
        run: |
          if [ -z "$TG_TOKEN" ] || [ -z "$TG_CHATID" ]; then
            echo "❌ TG_TOKEN ou TG_CHATID não configurado em Secrets!"
            exit 1
          fi
          echo "✅ Credenciais OK"

      - name: Rodar watchlist
        env:
          TG_TOKEN:  ${{ secrets.TG_TOKEN }}
          TG_CHATID: ${{ secrets.TG_CHATID }}
          CAPITAL:   '180'
          RISK_PCT:  '0.03'
          INTERVAL:  ${{ github.event.inputs.timeframe || '30m' }}
        run: python bot_manual.py
