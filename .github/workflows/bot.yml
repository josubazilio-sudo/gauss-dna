name: GAUSS+DNA Bot de Sinais

on:
  schedule:
    # Era */2h — caso real 22/06: run iniciado 01:11 (LOOP_MODE=true, nunca sai sozinho)
    # rodou ininterrupto até bater o timeout do step "Rodar bot" (325min) às 06:37 e
    # terminou em failure. Os ticks de cron esperados em 02h/04h/06h simplesmente não
    # dispararam (cron do GitHub Actions é best-effort, pode atrasar/pular sob carga) —
    # sem eles, o concurrency group (cancel-in-progress) nunca reiniciou o job, e o bot
    # ficou "parado" de 06:37 até o usuário notar. Reduzido pra 1h pra encurtar o buraco
    # se algum tick futuro também for perdido.
    # 2º caso real 22/06 (mesmo dia, ~14h depois): reduzir o cron pra 1h não foi
    # suficiente — o run das 01:11 ocupou o runner até 06:37 (325min), e os ticks de
    # 07h/08h foram pulados igual (mesmo motivo: GitHub pula tick agendado se o runner
    # anterior ainda está rodando), abrindo um buraco de 2h11min sem nenhum diagnóstico
    # até o próximo workflow_dispatch manual às 08:48. Causa raiz real: o timeout do
    # step "Rodar bot" (325min) é MAIOR que o intervalo do cron (1h=60min) — garante
    # matematicamente que, em qualquer run que dure o timeout completo, pelo menos um
    # tick agendado vai cair "no meio" do runner ocupado e ser descartado. Fix abaixo
    # (timeout-minutes do job/step) ataca a causa, não só o sintoma.
    - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      tg_token:
        description: 'Token do bot (vazio = usa Secret)'
        required: false
        default: ''
      tg_chatid:
        description: 'Chat ID do canal (vazio = usa Secret)'
        required: false
        default: ''
      test_mode:
        description: 'Forçar sinal de teste? (true/false)'
        required: false
        default: 'false'
      timeframes:
        description: 'Timeframes a analisar (ex: 5m,15m,1h  ou  30m,1h,4h)'
        required: false
        default: '30m,1h'
      filter_level:
        description: 'Nivel de filtros: 0=debug(force), 1=minimo, 2=moderado, 3=completo (padrao)'
        required: false
        default: '1'
      signal_mode:
        description: 'Modo de sinal: FLEX (padrao), ELITE, INSTITUCIONAL'
        required: false
        default: 'FLEX'

# Grupo unico fixo (autorizado 22/06 — caso real SUI/USDT BB_BREAK SHORT RSI=25 disparado
# por um run manual antigo (commit 1406031, branch claude/strategy-improvement-LUJWU,
# iniciado 20:02 UTC) que sobreviveu rodando em LOOP_MODE por horas com codigo desatualizado
# porque vivia num concurrency group separado (bot-manual-refs/heads/<branch>) do run
# disparado depois em main. Qualquer novo trigger, manual ou agendado, em qualquer branch,
# agora cancela TODO run anterior deste workflow — elimina a possibilidade de logica antiga
# rodar em paralelo com codigo ja corrigido.
concurrency:
  group: bot-sinais
  cancel-in-progress: true

jobs:
  scanner:
    runs-on: ubuntu-latest
    timeout-minutes: 58

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install aiohttp

      - name: Restaurar cooldown entre runs
        id: cache-restore
        uses: actions/cache/restore@v4
        with:
          path: |
            last_signals.json
            resultados_log.csv
            backtest_log.csv
          key: last-signals-${{ github.run_id }}
          restore-keys: last-signals-

      - name: Verificar credenciais
        env:
          TG_TOKEN_INPUT: ${{ github.event.inputs.tg_token }}
          TG_TOKEN_SECRET: ${{ secrets.TG_TOKEN }}
          TG_CHATID_INPUT: ${{ github.event.inputs.tg_chatid }}
          TG_CHATID_SECRET: ${{ secrets.TG_CHATID }}
        run: |
          TOKEN="${TG_TOKEN_INPUT:-$TG_TOKEN_SECRET}"
          CHATID="${TG_CHATID_INPUT:-$TG_CHATID_SECRET}"
          if [ -z "$TOKEN" ] || [ -z "$CHATID" ]; then
            echo "❌ TG_TOKEN ou TG_CHATID não configurado!"
            echo "   Preencha os campos ao rodar manualmente,"
            echo "   ou configure em Settings → Secrets → Actions"
            exit 1
          fi
          echo "✅ Credenciais OK — Token: ${TOKEN:0:8}... | Chat: $CHATID"

      - name: Auto-review (testes de saude)
        env:
          TG_TOKEN: ${{ github.event.inputs.tg_token != '' && github.event.inputs.tg_token || secrets.TG_TOKEN }}
          TG_CHATID: ${{ github.event.inputs.tg_chatid != '' && github.event.inputs.tg_chatid || secrets.TG_CHATID }}
          CAPITAL: ${{ vars.CAPITAL || '93' }}
          FILTER_LEVEL: '1'
          TIMEFRAMES: '15m'
          SIGNAL_MODE: 'FLEX'
        run: python test_bot.py

      - name: Rodar bot
        timeout-minutes: 55
        env:
          TG_TOKEN: ${{ github.event.inputs.tg_token != '' && github.event.inputs.tg_token || secrets.TG_TOKEN }}
          TG_CHATID: ${{ github.event.inputs.tg_chatid != '' && github.event.inputs.tg_chatid || secrets.TG_CHATID }}
          WA_PHONE: ${{ secrets.WA_PHONE }}
          WA_APIKEY: ${{ secrets.WA_APIKEY }}
          TIMEFRAMES: ${{ github.event.inputs.timeframes || '30m,1h' }}
          FILTER_LEVEL: ${{ github.event.inputs.filter_level || '1' }}
          CYCLE_INTERVAL: '300'
          SIGNAL_MODE: ${{ github.event.inputs.signal_mode || 'FLEX' }}
          DYNAMIC_SCAN: 'true'
          SCANNER_TOP: '200'
          LOOP_MODE: ${{ github.event.inputs.test_mode == 'true' && 'false' || 'true' }}
          TEST_MODE: ${{ github.event.inputs.test_mode || 'false' }}
          CAPITAL: ${{ vars.CAPITAL || '93' }}
          RISK_PCT: '0.03'
        run: python bot_actions.py

      - name: Salvar cooldown entre runs
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            last_signals.json
            resultados_log.csv
            backtest_log.csv
          key: last-signals-${{ github.run_id }}
