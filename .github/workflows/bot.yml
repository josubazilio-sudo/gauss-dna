name: GAUSS+DNA Bot de Sinais

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:
    inputs:
      filter_level:
        description: 'Nível de filtro (1-3)'
        required: false
        default: '3'
      timeframes:
        description: 'Timeframes para analisar'
        required: false
        default: '30m,1h'

jobs:
  scanner:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install aiohttp

      - name: Restaurar estado e journal
        uses: actions/cache@v4
        with:
          path: |
            last_signals.json
            signals_log.csv
          key: gauss-dna-state-${{ github.run_id }}
          restore-keys: |
            gauss-dna-state-

      - name: Rodar scanner de sinais
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHATID: ${{ secrets.TG_CHATID }}
          TIMEFRAMES: ${{ github.event.inputs.timeframes || '30m,1h' }}
          SIGNAL_MODE: 'ELITE'
          LOOP_MODE: 'false'
          CAPITAL: '97'
          RISK_PCT: '0.03'
          DYNAMIC_SCAN: 'false'
          SCANNER_TOP: '50'
          FILTER_LEVEL: ${{ github.event.inputs.filter_level || '3' }}
        run: python bot_actions.py
