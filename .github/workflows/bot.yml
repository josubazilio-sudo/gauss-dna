name: GAUSS+DNA Bot de Sinais

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  scanner:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar
        run: pip install aiohttp

      - name: Rodar bot
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHATID: ${{ secrets.TG_CHATID }}
          TIMEFRAME: '15m'
          COOLDOWN: '900'
        run: python bot_actions.py
