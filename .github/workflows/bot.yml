name: GAUSS+DNA Bot de Sinais

on:
  schedule:
    - cron: '0 */6 * * *'   # Inicia a cada 6 horas; loop interno cobre cada vela de 15m
  workflow_dispatch:          # Permite iniciar manualmente a qualquer momento

jobs:
  scanner:
    runs-on: ubuntu-latest
    timeout-minutes: 359      # Máximo permitido pelo GitHub Actions (~6 horas)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install aiohttp

      - name: Rodar bot (loop contínuo)
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHATID: ${{ secrets.TG_CHATID }}
          TIMEFRAME: '15m'
          COOLDOWN: '900'
          SIGNAL_MODE: 'FLEX'
          LOOP_MODE: 'true'
        run: python bot_actions.py
