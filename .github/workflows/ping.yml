name: 🔔 Ping Telegram (Diagnóstico)

on:
  workflow_dispatch:
    inputs:
      tg_token:
        description: 'Token do bot Telegram'
        required: false
        default: ''
      tg_chatid:
        description: 'Chat ID do canal/grupo'
        required: false
        default: ''

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Enviar ping no Telegram
        run: |
          # Usa input se fornecido, senão usa secret
          TOKEN="${{ github.event.inputs.tg_token }}"
          CHATID="${{ github.event.inputs.tg_chatid }}"
          if [ -z "$TOKEN" ]; then TOKEN="${{ secrets.TG_TOKEN }}"; fi
          if [ -z "$CHATID" ]; then CHATID="${{ secrets.TG_CHATID }}"; fi

          if [ -z "$TOKEN" ] || [ -z "$CHATID" ]; then
            echo "❌ Token ou Chat ID não fornecido"
            exit 1
          fi

          echo "Token: ${TOKEN:0:8}..."
          echo "Chat ID: $CHATID"

          RESPONSE=$(curl -s -X POST "https://api.telegram.org/bot${TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\":\"${CHATID}\",\"text\":\"✅ GAUSS+DNA conectado ao canal\\! Bot funcionando e pronto para enviar sinais.\",\"parse_mode\":\"MarkdownV2\"}")

          echo "Resposta: $RESPONSE"

          OK=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('ok',False))" 2>/dev/null)
          if [ "$OK" = "True" ]; then
            echo "✅ SUCESSO — mensagem enviada no canal!"
          else
            DESC=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('description','erro'))" 2>/dev/null)
            echo "❌ ERRO: $DESC"
            exit 1
          fi
