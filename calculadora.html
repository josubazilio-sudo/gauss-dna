<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>GAUSS+DNA Journal</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#26a69a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="GAUSS+DNA">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#131722;--panel:#1e222d;--border:#2a2e39;--text:#d1d4dc;--muted:#848994;
  --green:#26a69a;--red:#ef5350;--orange:#ff9800;--gold:#ffd700;--blue:#2196f3;
}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;
  font-size:14px;min-height:100vh;display:flex;flex-direction:column}

/* HEADER */
header{background:var(--panel);border-bottom:1px solid var(--border);
  padding:11px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
header h1{font-size:15px;font-weight:800}
header h1 span{color:var(--green)}
.hbadge{font-size:10px;color:var(--muted);background:var(--border);
  padding:2px 7px;border-radius:10px}

/* CAPITAL BAR */
#capital-bar{background:var(--panel);border-bottom:1px solid var(--border);
  padding:10px 16px;display:flex;flex-direction:column;gap:8px;flex-shrink:0}
.cap-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.cap-lbl{color:var(--muted);font-size:11px;white-space:nowrap}
.cap-val{font-size:18px;font-weight:800;color:var(--green);min-width:60px}
input[type=range]{flex:1;min-width:100px;accent-color:var(--green);cursor:pointer;height:3px}
input[type=number],input[type=text]{background:#252836;color:var(--text);border:1px solid #3d4250;
  border-radius:4px;padding:5px 8px;font-size:13px;outline:none}
input[type=number]{width:75px}
input[type=number]:focus,input[type=text]:focus{border-color:var(--green)}
.rpbs{display:flex;gap:4px}
.rpb{background:var(--border);border:1px solid #3d4250;color:var(--muted);padding:3px 8px;
  border-radius:3px;cursor:pointer;font-size:11px;transition:.15s}
.rpb.on{background:var(--green);color:#fff;border-color:var(--green)}
.risk-info{display:flex;gap:14px;margin-left:4px}
.ri{display:flex;flex-direction:column;gap:1px}
.ri .l{font-size:10px;color:var(--muted);text-transform:uppercase}
.ri .v{font-size:14px;font-weight:700}

/* TABS */
#tabs{display:flex;background:var(--panel);border-bottom:1px solid var(--border);flex-shrink:0}
.tab{flex:1;padding:10px 4px;text-align:center;cursor:pointer;font-size:12px;font-weight:600;
  color:var(--muted);border-bottom:2px solid transparent;transition:.15s}
.tab.on{color:var(--green);border-bottom-color:var(--green)}

/* CONTENT */
#content{flex:1;overflow-y:auto;padding:12px 14px}

/* FORM */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.fg{display:flex;flex-direction:column;gap:3px}
.fg label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px}
.fg input,.fg select{background:#252836;color:var(--text);border:1px solid #3d4250;
  border-radius:4px;padding:7px 9px;font-size:14px;width:100%;outline:none}
.fg input:focus,.fg select:focus{border-color:var(--green)}
.dir-row{display:flex;gap:6px}
.db{flex:1;padding:7px;border-radius:4px;border:1px solid var(--border);
  background:var(--border);color:var(--muted);font-weight:700;cursor:pointer;font-size:13px;transition:.15s}
.db.long.on{background:#26a69a20;color:var(--green);border-color:var(--green)}
.db.short.on{background:#ef535020;color:var(--red);border-color:var(--red)}
.gb{flex:1;padding:7px;border-radius:4px;border:1px solid var(--border);
  background:var(--border);color:var(--muted);font-weight:700;cursor:pointer;font-size:13px;transition:.15s}
.gb.gs{background:#ffd70020;color:var(--gold);border-color:var(--gold)}
.gb.ga{background:#ff980020;color:var(--orange);border-color:var(--orange)}
.gb.gb2{background:#2196f320;color:var(--blue);border-color:var(--blue)}

/* EXTRAS ROW */
.extras{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:10px}
.extras-toggle{font-size:11px;color:var(--green);cursor:pointer;text-align:right;
  margin-bottom:4px;text-decoration:underline}

/* DNA CARD */
.dna-card{background:#1a1f2e;border:1px solid #2e3447;border-radius:10px;
  padding:14px;margin-bottom:10px;font-size:13px;line-height:1.75}
.dna-card.long-card{border-left:3px solid var(--green)}
.dna-card.short-card{border-left:3px solid var(--red)}
.dna-header{font-size:14px;font-weight:800;color:#fff;margin-bottom:8px;
  padding-bottom:8px;border-bottom:1px solid #2e3447}
.dna-sub{color:var(--muted);font-size:12px;margin-bottom:6px}
.dna-grade{font-weight:700;margin-bottom:10px}
.dna-line{display:flex;justify-content:space-between;align-items:center;
  padding:3px 0;border-bottom:1px solid #2a2f40}
.dna-line:last-of-type{border-bottom:none}
.dna-line .lk{color:var(--muted)}
.dna-line .lv{font-weight:700;text-align:right}
.dna-sep{border:none;border-top:1px solid #2e3447;margin:8px 0}
.dna-exit{display:flex;justify-content:space-between;align-items:center;
  background:#252d3d;border-radius:6px;padding:8px 10px;margin-bottom:5px}
.dna-exit .etag{font-size:11px;font-weight:700;padding:2px 7px;border-radius:3px}
.dna-exit .eprice{font-weight:800;font-size:15px}
.dna-exit .einfo{font-size:11px;color:var(--muted)}
.dna-mgmt{background:#1e2435;border-radius:6px;padding:8px 10px;margin:8px 0;font-size:12px;line-height:1.9}
.dna-footer{color:var(--muted);font-size:11px;margin-top:8px;
  padding-top:8px;border-top:1px solid #2e3447}
.no-sig{text-align:center;color:var(--muted);padding:24px;font-size:13px;
  background:#1a1f2e;border-radius:8px}

/* OPEN BTN */
.open-btn{width:100%;padding:11px;background:var(--green);color:#fff;border:none;
  border-radius:6px;font-size:14px;font-weight:800;cursor:pointer;margin-bottom:4px;transition:.15s}
.open-btn:hover{background:#2bbbad}
.open-btn:disabled{background:#2a2e39;color:#555;cursor:not-allowed}

/* OUTCOME BUTTONS */
.outcome-row{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap}
.ocb{flex:1;min-width:calc(50% - 3px);padding:9px 6px;border-radius:6px;border:none;
  font-size:12px;font-weight:700;cursor:pointer;transition:.15s;text-align:center}
.ocb-stop{background:#ef535025;color:var(--red);border:1px solid #ef535050}
.ocb-stop:hover{background:#ef535040}
.ocb-parc{background:#26a69a25;color:var(--green);border:1px solid #26a69a50}
.ocb-parc:hover{background:#26a69a40}
.ocb-full{background:#ffd70025;color:var(--gold);border:1px solid #ffd70050}
.ocb-full:hover{background:#ffd70040}
.ocb-man{background:#2196f320;color:var(--blue);border:1px solid #2196f350}
.ocb-man:hover{background:#2196f340}

/* STATUS BADGES */
.status-badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:700}
.sb-open{background:#ff980025;color:var(--orange);border:1px solid #ff980050}
.sb-parc{background:#2196f325;color:var(--blue);border:1px solid #2196f350}
.sb-win{background:#26a69a25;color:var(--green);border:1px solid #26a69a50}
.sb-loss{background:#ef535025;color:var(--red);border:1px solid #ef535050}
.sb-manual{background:#9c27b025;color:#ce93d8;border:1px solid #9c27b050}

/* DASHBOARD */
.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.dash-card{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:12px}
.dash-card .dl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px}
.dash-card .dv{font-size:22px;font-weight:800}
.open-trades-section h3{font-size:12px;color:var(--muted);text-transform:uppercase;
  letter-spacing:.5px;margin-bottom:8px}
.open-trade-card{background:var(--panel);border:1px solid var(--border);border-radius:8px;
  padding:12px;margin-bottom:8px}
.otc-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.otc-sym{font-weight:800;font-size:15px}
.otc-info{display:flex;gap:10px;font-size:12px;color:var(--muted);margin-bottom:8px;flex-wrap:wrap}
.otc-info span{color:var(--text)}
.parc-notice{background:#2196f315;border:1px solid #2196f330;border-radius:5px;
  padding:6px 10px;font-size:12px;color:var(--blue);margin-bottom:6px}
.manual-row{display:flex;gap:6px;margin-top:6px;align-items:center}
.manual-row input{flex:1;background:#252836;color:var(--text);border:1px solid #3d4250;
  border-radius:4px;padding:6px 8px;font-size:13px;outline:none}
.manual-row button{background:var(--blue);color:#fff;border:none;border-radius:4px;
  padding:6px 12px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap}

/* DIARY */
.diary-card{background:var(--panel);border:1px solid var(--border);border-radius:8px;
  padding:12px;margin-bottom:8px}
.dc-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.dc-sym{font-weight:800;font-size:14px}
.dc-date{font-size:10px;color:var(--muted)}
.dc-stats{display:flex;gap:12px;font-size:12px;flex-wrap:wrap;margin-bottom:6px}
.dc-stats .k{color:var(--muted)}
.dc-stats .v{font-weight:600}
.dc-pl{display:flex;justify-content:space-between;align-items:center;
  padding-top:6px;border-top:1px solid var(--border)}
.dc-pl .plr{font-size:16px;font-weight:800}
.dc-pl .plusd{font-size:12px;color:var(--muted)}
.empty-state{text-align:center;color:var(--muted);padding:40px 20px;font-size:13px}
.sect-title{font-size:12px;color:var(--muted);text-transform:uppercase;
  letter-spacing:.5px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.small-btn{background:var(--border);border:1px solid #3d4250;color:var(--muted);
  padding:3px 10px;border-radius:4px;cursor:pointer;font-size:11px}
.small-btn:hover{color:var(--red);border-color:var(--red)}
</style>
</head>
<body>

<!-- Banner iOS: só aparece no Safari iOS quando não está instalado -->
<div id="ios-banner" style="display:none;background:#1e2d1e;border-bottom:1px solid #26a69a40;
  padding:10px 14px;font-size:12px;color:#d1d4dc;line-height:1.6">
  📲 <b>Instalar no iPhone:</b> toque em <b>⎙ Compartilhar</b> → <b>"Adicionar à Tela Inicial"</b>
  <button onclick="document.getElementById('ios-banner').style.display='none'"
    style="float:right;background:none;border:none;color:#848994;font-size:16px;cursor:pointer;margin-top:-2px">✕</button>
</div>

<header>
  <h1>GAUSS<span>+DNA</span> Journal</h1>
  <div style="display:flex;align-items:center;gap:8px">
    <span class="hbadge">FLEX · 2 Saídas</span>
    <button id="install-btn" onclick="installApp()" style="display:none;
      background:#26a69a;color:#fff;border:none;border-radius:5px;
      padding:5px 11px;font-size:11px;font-weight:700;cursor:pointer">
      📲 Instalar
    </button>
  </div>
</header>

<!-- CAPITAL BAR -->
<div id="capital-bar">
  <div class="cap-row">
    <span class="cap-lbl">💰 CAPITAL</span>
    <span class="cap-val" id="cap-display">$180</span>
    <input type="range" id="cap-slider" min="50" max="1000" step="10" value="180">
    <input type="number" id="cap-input" min="1" max="9999" value="180">
  </div>
  <div class="cap-row">
    <span class="cap-lbl">⚖️ RISCO</span>
    <div class="rpbs">
      <button class="rpb" onclick="setRisk(1)">1%</button>
      <button class="rpb" onclick="setRisk(2)">2%</button>
      <button class="rpb on" onclick="setRisk(3)">3%</button>
      <button class="rpb" onclick="setRisk(5)">5%</button>
    </div>
    <div class="risk-info">
      <div class="ri"><span class="l">Por trade</span><span class="v" id="risk-usd" style="color:var(--orange)">$5.40</span></div>
      <div class="ri"><span class="l">Máx lucro</span><span class="v" id="max-cap" style="color:var(--green)">—</span></div>
    </div>
  </div>
</div>

<!-- TABS -->
<div id="tabs">
  <div class="tab on" onclick="showTab('sinal')">🎯 Sinal</div>
  <div class="tab" onclick="showTab('dash')">📊 Dashboard</div>
  <div class="tab" onclick="showTab('diario')">📋 Diário</div>
</div>

<!-- CONTENT -->
<div id="content">

  <!-- ── SINAL ── -->
  <div id="tab-sinal">
    <div class="form-grid">
      <div class="fg" style="grid-column:1/-1">
        <label>Par</label>
        <input type="text" id="inp-sym" value="SOLUSDT" oninput="recalc()" placeholder="SOLUSDT">
      </div>
      <div class="fg">
        <label>Direção</label>
        <div class="dir-row">
          <button class="db long on" id="btn-long" onclick="setDir('LONG')">▲ LONG</button>
          <button class="db short" id="btn-short" onclick="setDir('SHORT')">▼ SHORT</button>
        </div>
      </div>
      <div class="fg">
        <label>Grade</label>
        <div class="dir-row">
          <button class="gb gs" id="btn-s" onclick="setGrade('S')">S</button>
          <button class="gb" id="btn-a" onclick="setGrade('A')">A</button>
          <button class="gb" id="btn-b" onclick="setGrade('B')">B</button>
        </div>
      </div>
      <div class="fg" style="grid-column:1/-1">
        <label>Gráfico</label>
        <div class="dir-row">
          <button class="gb" id="btn-tf-15m" onclick="setTf('15m')">15M</button>
          <button class="gb" id="btn-tf-30m" onclick="setTf('30m')">30M</button>
          <button class="gb" id="btn-tf-1h"  onclick="setTf('1h')">1H</button>
          <button class="gb" id="btn-tf-4h"  onclick="setTf('4h')">4H</button>
        </div>
      </div>
      <div class="fg">
        <label>Entrada ($)</label>
        <input type="number" id="inp-entry" placeholder="0.00" step="any" oninput="recalc()">
      </div>
      <div class="fg">
        <label>ATR ($) — opcional</label>
        <input type="number" id="inp-atr" placeholder="auto 1%" step="any" oninput="recalc()">
      </div>
    </div>

    <div class="extras-toggle" onclick="toggleExtras()">+ Dados do bot (Score, RSI, ADX)</div>
    <div id="extras-row" class="extras" style="display:none">
      <div class="fg"><label>Score</label><input type="number" id="inp-score" placeholder="-90" oninput="recalc()"></div>
      <div class="fg"><label>RSI</label><input type="number" id="inp-rsi" placeholder="34" oninput="recalc()"></div>
      <div class="fg"><label>ADX</label><input type="number" id="inp-adx" placeholder="46" oninput="recalc()"></div>
      <div class="fg"><label>Trend</label>
        <select id="inp-trend" onchange="recalc()">
          <option value="">—</option>
          <option value="BULL">BULL</option>
          <option value="BEAR">BEAR</option>
          <option value="NEUTRO">NEUTRO</option>
        </select>
      </div>
      <div class="fg"><label>Kalman</label>
        <select id="inp-kalman" onchange="recalc()">
          <option value="">—</option>
          <option value="↑">↑ Subindo</option>
          <option value="↓">↓ Caindo</option>
        </select>
      </div>
      <div class="fg"><label>Tipo sinal</label>
        <select id="inp-tipo" onchange="recalc()">
          <option value="FLEX">⚡ DNA FLEX</option>
          <option value="PULLBACK">🎯 DNA PULLBACK</option>
          <option value="MOMENTUM">🚀 DNA MOMENTUM</option>
          <option value="SURGE">⚡ DNA SURGE</option>
          <option value="MTF">📡 MTF 4H→1H</option>
          <option value="BB_BREAK">💥 BB BREAK</option>
          <option value="ELITE">🔬 DNA ELITE</option>
        </select>
      </div>
    </div>

    <div id="dna-preview"><div class="no-sig">Preencha a entrada para gerar o sinal</div></div>
    <button class="open-btn" id="open-btn" onclick="openTrade()" disabled>📌 Abrir Trade</button>
  </div>

  <!-- ── DASHBOARD ── -->
  <div id="tab-dash" style="display:none">
    <div class="dash-grid" id="dash-stats"></div>
    <div class="open-trades-section">
      <div class="sect-title">⚡ Trades Abertos</div>
      <div id="open-trades-list"></div>
    </div>
  </div>

  <!-- ── DIÁRIO ── -->
  <div id="tab-diario" style="display:none">
    <div class="sect-title">
      <span>Histórico de Trades</span>
      <div style="display:flex;gap:6px">
        <button class="small-btn" onclick="exportDiaryCsv()">📥 Exportar CSV</button>
        <button class="small-btn" onclick="clearDiary()">🗑 Limpar</button>
      </div>
    </div>
    <div id="diary-list"></div>
  </div>

</div>

<script>
// ── STATE ─────────────────────────────────────────────────────────────────────
let S = {capital:180, riskPct:3, dir:'LONG', grade:'S', tf:'15m', trades:[]};
const TF_LABELS = {'15m':'15M', '30m':'30M', '1h':'1H', '4h':'4H'};

// ── INIT ──────────────────────────────────────────────────────────────────────
function init() {
  const raw = localStorage.getItem('gauss_journal');
  if (raw) { try { Object.assign(S, JSON.parse(raw)); } catch(e){} }
  // Validar grade/dir para evitar crash se localStorage estiver corrompido
  if (!['S','A','B'].includes(S.grade)) S.grade = 'S';
  if (!['LONG','SHORT'].includes(S.dir)) S.dir = 'LONG';
  if (![1,2,3,5].includes(S.riskPct)) S.riskPct = 3;
  if (!['15m','30m','1h','4h'].includes(S.tf)) S.tf = '15m';
  document.getElementById('cap-slider').value = S.capital;
  document.getElementById('cap-input').value  = S.capital;
  setRisk(S.riskPct, true);
  setDir(S.dir);
  setGrade(S.grade);
  setTf(S.tf);
  updateCap();
  recalc();
}
function persist() {
  localStorage.setItem('gauss_journal', JSON.stringify(S));
}

// ── CAPITAL ───────────────────────────────────────────────────────────────────
document.getElementById('cap-slider').addEventListener('input', function(){
  S.capital = +this.value;
  document.getElementById('cap-input').value = S.capital;
  updateCap(); recalc(); persist();
});
document.getElementById('cap-input').addEventListener('input', function(){
  const v = Math.max(1, Math.min(9999, +this.value||180));
  S.capital = v;
  document.getElementById('cap-slider').value = Math.min(1000,v);
  updateCap(); recalc(); persist();
});
function updateCap() {
  document.getElementById('cap-display').textContent = '$'+S.capital;
  const r = S.capital * S.riskPct / 100;
  document.getElementById('risk-usd').textContent = '$'+r.toFixed(2);
  document.getElementById('max-cap').textContent = '+$'+(r*4.7).toFixed(2);
}
function setRisk(p, silent) {
  S.riskPct = p;
  document.querySelectorAll('.rpb').forEach((b,i) => {
    b.classList.toggle('on', [1,2,3,5][i]===p);
  });
  updateCap();
  if (!silent) { recalc(); persist(); }
}
function setDir(d) {
  S.dir = d;
  document.getElementById('btn-long').classList.toggle('on', d==='LONG');
  document.getElementById('btn-short').classList.toggle('on', d==='SHORT');
  recalc(); persist();
}
function setGrade(g) {
  S.grade = g;
  document.getElementById('btn-s').className = 'gb' + (g==='S'?' gs':'');
  document.getElementById('btn-a').className = 'gb' + (g==='A'?' ga':'');
  document.getElementById('btn-b').className = 'gb' + (g==='B'?' gb2':'');
  recalc(); persist();
}
function setTf(tf) {
  S.tf = tf;
  for (const k of ['15m','30m','1h','4h']) {
    document.getElementById('btn-tf-'+k).className = 'gb' + (k===tf?' ga':'');
  }
  recalc(); persist();
}

function toggleExtras() {
  const el = document.getElementById('extras-row');
  el.style.display = el.style.display==='none' ? 'grid' : 'none';
}

// ── CALC ──────────────────────────────────────────────────────────────────────
function fmt(v) {
  if (!v && v!==0) return '—';
  if (v>=10000) return v.toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
  if (v>=1) return v.toFixed(3);
  if (v>=0.01) return v.toFixed(4);
  if (v>=0.0001) return v.toFixed(5);
  return v.toFixed(7);
}
function fmtU(v) { return '$'+(+Math.abs(v)).toFixed(2); }

function calcSig(entry, atr, dir, grade, capital, riskPct) {
  const risk  = capital * riskPct / 100;
  const dist  = 1.2 * atr;
  const qty   = risk / dist;
  const posV  = qty * entry;
  const pos5x = posV / 5;
  const isL   = dir==='LONG';
  const tgt = ({S:{r1:2.5,rf:8.0},A:{r1:2.0,rf:6.0},B:{r1:2.0,rf:5.0}}[grade])
              || {r1:2.5,rf:8.0}; // fallback para grade inválido
  return {
    entry, atr, dist, risk, qty, posV, pos5x, dir, grade, capital, riskPct,
    stop:   isL ? entry-dist : entry+dist,
    tp1:    isL ? entry+dist*tgt.r1 : entry-dist*tgt.r1,
    tpF:    isL ? entry+dist*tgt.rf  : entry-dist*tgt.rf,
    r1:tgt.r1, rf:tgt.rf,
    p1: risk*tgt.r1*0.6,
    pF: risk*tgt.rf*0.4,
    maxP: risk*(tgt.r1*0.6 + tgt.rf*0.4),
    avgR: tgt.r1*0.6 + tgt.rf*0.4,
  };
}

let _lastSig = null;

function recalc() {
  try {
    // Aceita vírgula como separador decimal (teclado BR)
    const rawE = document.getElementById('inp-entry').value.replace(',','.');
    const rawA = document.getElementById('inp-atr').value.replace(',','.');
    const entry = parseFloat(rawE);
    let   atr   = parseFloat(rawA);
    const sym   = document.getElementById('inp-sym').value.toUpperCase()||'?';

    if (!entry||entry<=0) {
      document.getElementById('dna-preview').innerHTML =
        '<div class="no-sig">Preencha o preço de entrada para gerar o sinal</div>';
      document.getElementById('open-btn').disabled = true;
      _lastSig = null; return;
    }
    if (!atr||atr<=0) atr = entry*0.01;

    const sig = calcSig(entry, atr, S.dir, S.grade, S.capital, S.riskPct);
    sig.sym   = sym;
    sig.tf    = S.tf;
    sig.score = document.getElementById('inp-score').value||'';
    sig.rsi   = document.getElementById('inp-rsi').value||'';
    sig.adx   = document.getElementById('inp-adx').value||'';
    sig.trend = document.getElementById('inp-trend').value;
    sig.kalman= document.getElementById('inp-kalman').value;
    sig.tipo  = document.getElementById('inp-tipo').value;
    sig.autoAtr = !parseFloat(rawA);

    _lastSig = sig;
    document.getElementById('dna-preview').innerHTML = buildDnaCard(sig, false);
    document.getElementById('open-btn').disabled = false;
  } catch(err) {
    document.getElementById('dna-preview').innerHTML =
      `<div class="no-sig" style="color:var(--red)">⚠️ Erro: ${err.message}</div>`;
  }
}

function buildDnaCard(sig, forHistory, status, closedData) {
  const isL   = sig.dir==='LONG';
  const base  = sig.sym.replace('USDT','').replace('usdt','');
  const gradeLabel = {S:'🏆 GRADE S — Setup perfeito',A:'⭐ GRADE A — Setup sólido',B:'📊 GRADE B — Setup básico'}[sig.grade];
  const gradeColor = {S:'var(--gold)',A:'var(--orange)',B:'var(--blue)'}[sig.grade];
  const tipoMap = {
    FLEX:'⚡ DNA FLEX', PULLBACK:'🎯 DNA PULLBACK', MOMENTUM:'🚀 DNA MOMENTUM',
    SURGE:'⚡ DNA SURGE', MTF:'📡 MTF 4H→1H', BB_BREAK:'💥 BB BREAK', ELITE:'🔬 DNA ELITE'
  };
  const tipo = tipoMap[sig.tipo]||'⚡ DNA FLEX';
  const now  = sig.date || new Date().toLocaleString('pt-BR',{hour:'2-digit',minute:'2-digit',day:'2-digit',month:'2-digit',year:'numeric'});
  const autoNote = sig.autoAtr ? ' <span style="color:var(--muted);font-size:10px">(ATR auto 1%)</span>' : '';

  let scoreLine = '';
  if (sig.score||sig.rsi||sig.adx) {
    const parts = [];
    if (sig.score) parts.push(`Score: <b>${sig.score}/145</b>`);
    if (sig.rsi)   parts.push(`RSI: ${sig.rsi}`);
    if (sig.adx)   parts.push(`ADX: ${sig.adx}`);
    scoreLine = `<div class="dna-footer">📊 ${parts.join(' | ')}</div>`;
  }
  let trendLine = '';
  if (sig.trend||sig.kalman) {
    const t = sig.trend ? `Trend: <b style="color:${sig.trend==='BULL'?'var(--green)':sig.trend==='BEAR'?'var(--red)':'var(--muted)'}">${sig.trend}</b>` : '';
    const k = sig.kalman ? `Kalman: <b>${sig.kalman}</b>` : '';
    trendLine = `<div class="dna-footer">📈 ${[t,k].filter(Boolean).join(' | ')}</div>`;
  }

  let statusBar = '';
  if (status==='open')
    statusBar = `<div style="margin-bottom:8px"><span class="status-badge sb-open">⚡ ABERTO</span></div>`;
  else if (status==='parcial')
    statusBar = `<div style="margin-bottom:8px"><span class="status-badge sb-parc">🎯 PARCIAL FECHADO</span></div>`;
  else if (status==='win')
    statusBar = `<div style="margin-bottom:8px"><span class="status-badge sb-win">✅ WIN ${closedData||''}</span></div>`;
  else if (status==='loss')
    statusBar = `<div style="margin-bottom:8px"><span class="status-badge sb-loss">🛑 LOSS ${closedData||''}</span></div>`;
  else if (status==='manual')
    statusBar = `<div style="margin-bottom:8px"><span class="status-badge sb-manual">📝 MANUAL ${closedData||''}</span></div>`;

  return `
  <div class="dna-card ${isL?'long-card':'short-card'}">
    ${statusBar}
    <div class="dna-header">🚨 ${tipo} — ${sig.dir}</div>
    <div class="dna-sub">${isL?'🟢':'🔴'} <b>${base}/USDT</b> &nbsp;|&nbsp; 🕐 Gráfico: ${TF_LABELS[sig.tf]||sig.tf||'15M'}</div>
    <div class="dna-grade" style="color:${gradeColor}">${gradeLabel}</div>
    <div class="dna-line"><span class="lk">💰 Entrada</span><span class="lv">${fmt(sig.entry)}</span></div>
    <div class="dna-line"><span class="lk">🛑 Stop${autoNote}</span><span class="lv" style="color:var(--red)">${fmt(sig.stop)}</span></div>
    <hr class="dna-sep">
    <div class="dna-exit">
      <div>
        <div class="etag" style="background:#26a69a20;color:var(--green);border:1px solid #26a69a50">🎯 TP PARCIAL 60%</div>
        <div class="einfo">+${sig.r1}R → fechar 60%</div>
      </div>
      <div style="text-align:right">
        <div class="eprice" style="color:var(--green)">${fmt(sig.tp1)}</div>
        <div class="einfo">+${fmtU(sig.p1)}</div>
      </div>
    </div>
    <div class="dna-exit">
      <div>
        <div class="etag" style="background:#ffd70020;color:var(--gold);border:1px solid #ffd70050">🏆 TP TOTAL 40%</div>
        <div class="einfo">+${sig.rf}R → fechar 40%</div>
      </div>
      <div style="text-align:right">
        <div class="eprice" style="color:var(--gold)">${fmt(sig.tpF)}</div>
        <div class="einfo">+${fmtU(sig.pF)}</div>
      </div>
    </div>
    <div class="dna-mgmt">
      📐 <b>Gestão de risco (${sig.riskPct}% de $${sig.capital})</b><br>
      &nbsp;&nbsp;Risco: <b style="color:var(--orange)">${fmtU(sig.risk)}</b><br>
      &nbsp;&nbsp;Spot: <b>${sig.qty.toFixed(4)} ${base}</b> (≈${fmtU(sig.posV)} USDT)<br>
      &nbsp;&nbsp;5x Lev: <b style="color:var(--blue)">${fmtU(sig.pos5x)}</b> collateral
    </div>
    ${scoreLine}${trendLine}
    <div class="dna-footer">⏰ ${now}</div>
  </div>`;
}

// ── OPEN TRADE ────────────────────────────────────────────────────────────────
function openTrade() {
  if (!_lastSig) return;
  const sig = {..._lastSig,
    id: Date.now(),
    date: new Date().toLocaleString('pt-BR',{hour:'2-digit',minute:'2-digit',day:'2-digit',month:'2-digit',year:'numeric'}),
    status: 'open',
    parcialDone: false,
  };
  S.trades.unshift(sig);
  persist();
  renderDash();
  showTab('dash');
}

// ── CLOSE ACTIONS ─────────────────────────────────────────────────────────────
function doStop(id) {
  const t = S.trades.find(x=>x.id===id);
  if (!t) return;
  if (t.parcialDone) {
    // Already hit TP1 (60%), now stop on remaining 40%
    t.rResult = t.r1*0.6 - 0.4;
    t.plUsd   = t.risk*(t.r1*0.6 - 0.4);
    t.closedNote = `${t.rResult>=0?'+':''}${t.rResult.toFixed(2)}R (parcial+stop)`;
    t.status = t.rResult >= 0 ? 'win' : 'loss';
  } else {
    t.rResult = -1.0;
    t.plUsd   = -t.risk;
    t.closedNote = '-1.00R';
    t.status  = 'loss';
  }
  t.closedAt = new Date().toLocaleString('pt-BR',{hour:'2-digit',minute:'2-digit',day:'2-digit',month:'2-digit'});
  persist(); renderDash(); renderDiary();
}

function doParcial(id) {
  const t = S.trades.find(x=>x.id===id);
  if (!t||t.parcialDone) return;
  t.parcialDone = true;
  t.status = 'parcial';
  persist(); renderDash();
}

function doFull(id) {
  const t = S.trades.find(x=>x.id===id);
  if (!t) return;
  if (t.parcialDone) {
    t.rResult = t.r1*0.6 + t.rf*0.4;
    t.plUsd   = t.risk*(t.r1*0.6 + t.rf*0.4);
  } else {
    // Full TP without partial first (close all at final)
    t.rResult = t.r1*0.6 + t.rf*0.4;
    t.plUsd   = t.risk*(t.r1*0.6 + t.rf*0.4);
  }
  t.closedNote = `+${t.rResult.toFixed(2)}R`;
  t.status  = 'win';
  t.closedAt = new Date().toLocaleString('pt-BR',{hour:'2-digit',minute:'2-digit',day:'2-digit',month:'2-digit'});
  persist(); renderDash(); renderDiary();
}

function doManual(id) {
  const price = parseFloat(document.getElementById('manual-price-'+id).value);
  const t = S.trades.find(x=>x.id===id);
  if (!t||!price||price<=0) return;
  const isL = t.dir==='LONG';
  const pnlPct = isL ? (price-t.entry)/t.entry : (t.entry-price)/t.entry;
  const rFull  = pnlPct * t.entry / t.dist;
  if (t.parcialDone) {
    t.rResult = t.r1*0.6 + rFull*0.4;
  } else {
    t.rResult = rFull;
  }
  t.plUsd = t.risk * t.rResult;
  t.closedNote = `${t.rResult>=0?'+':''}${t.rResult.toFixed(2)}R @ ${fmt(price)}`;
  t.status = t.rResult > 0 ? 'win' : t.rResult < -0.1 ? 'loss' : 'manual';
  if (t.status==='win'||t.status==='loss') {} else t.status='manual';
  t.closedAt = new Date().toLocaleString('pt-BR',{hour:'2-digit',minute:'2-digit',day:'2-digit',month:'2-digit'});
  persist(); renderDash(); renderDiary();
}

let manualOpen = {};
function toggleManual(id) {
  manualOpen[id] = !manualOpen[id];
  renderDash();
}

// ── DASHBOARD ─────────────────────────────────────────────────────────────────
function renderDash() {
  const closed = S.trades.filter(t=>['win','loss','manual'].includes(t.status));
  const open   = S.trades.filter(t=>['open','parcial'].includes(t.status));
  const wins   = closed.filter(t=>t.rResult>0).length;
  const totalR = closed.reduce((a,t)=>a+(t.rResult||0),0);
  const totalUsd = closed.reduce((a,t)=>a+(t.plUsd||0),0);
  const wr = closed.length ? Math.round(wins/closed.length*100) : 0;

  document.getElementById('dash-stats').innerHTML = `
    <div class="dash-card">
      <div class="dl">Trades fechados</div>
      <div class="dv" style="color:var(--text)">${closed.length}</div>
      <div style="font-size:11px;color:var(--muted);margin-top:2px">${open.length} aberto(s)</div>
    </div>
    <div class="dash-card">
      <div class="dl">Win Rate</div>
      <div class="dv" style="color:${wr>=55?'var(--green)':wr>=45?'var(--orange)':'var(--red)'}">${wr}%</div>
      <div style="font-size:11px;color:var(--muted);margin-top:2px">${wins}W / ${closed.length-wins}L</div>
    </div>
    <div class="dash-card">
      <div class="dl">R Total</div>
      <div class="dv" style="color:${totalR>=0?'var(--green)':'var(--red)'}">${totalR>=0?'+':''}${totalR.toFixed(2)}R</div>
      <div style="font-size:11px;color:var(--muted);margin-top:2px">R médio: ${closed.length?(totalR/closed.length).toFixed(2):'—'}</div>
    </div>
    <div class="dash-card">
      <div class="dl">P&L Total</div>
      <div class="dv" style="color:${totalUsd>=0?'var(--green)':'var(--red)'}">${totalUsd>=0?'+':''}$${Math.abs(totalUsd).toFixed(2)}</div>
      <div style="font-size:11px;color:var(--muted);margin-top:2px">sobre capital $${S.capital}</div>
    </div>`;

  const ol = document.getElementById('open-trades-list');
  if (!open.length) {
    ol.innerHTML = '<div class="empty-state" style="padding:20px">Nenhum trade aberto</div>';
    return;
  }

  ol.innerHTML = open.map(t => {
    const isL = t.dir==='LONG';
    const base = t.sym.replace('USDT','');
    const gc = {S:'var(--gold)',A:'var(--orange)',B:'var(--blue)'}[t.grade];
    const isParcial = t.status==='parcial';
    const showManual = manualOpen[t.id];

    return `
    <div class="open-trade-card">
      <div class="otc-top">
        <div style="display:flex;align-items:center;gap:8px">
          <span class="otc-sym">${base}/USDT</span>
          <span style="color:${isL?'var(--green)':'var(--red)'};font-weight:700;font-size:12px">${t.dir}</span>
          <span style="color:${gc};font-size:11px;font-weight:700">Grade ${t.grade}</span>
        </div>
        <span class="status-badge ${isParcial?'sb-parc':'sb-open'}">${isParcial?'🎯 PARCIAL':'⚡ ABERTO'}</span>
      </div>
      <div class="otc-info">
        <span>Entrada <span>${fmt(t.entry)}</span></span>
        <span>Stop <span style="color:var(--red)">${fmt(t.stop)}</span></span>
        <span>Parcial <span style="color:var(--green)">${fmt(t.tp1)}</span></span>
        <span>Total <span style="color:var(--gold)">${fmt(t.tpF)}</span></span>
        <span>Risco <span style="color:var(--orange)">${fmtU(t.risk)}</span></span>
      </div>
      ${isParcial?`<div class="parc-notice">✅ 60% fechado em TP Parcial (+${t.r1}R = +${fmtU(t.p1)}) — aguardando 40% restante</div>`:''}
      <div class="outcome-row">
        ${!isParcial?`<button class="ocb ocb-parc" onclick="doParcial(${t.id})">✅ TP Parcial 60%</button>`:''}
        <button class="ocb ocb-full" onclick="doFull(${t.id})">🏆 TP ${isParcial?'Total 40%':'Full'}</button>
        <button class="ocb ocb-stop" onclick="doStop(${t.id})">🛑 ${isParcial?'Stop 40%':'Stop'}</button>
        <button class="ocb ocb-man" onclick="toggleManual(${t.id})">📝 Manual</button>
      </div>
      ${showManual?`<div class="manual-row">
        <input type="number" id="manual-price-${t.id}" placeholder="Preço de saída" step="any">
        <button onclick="doManual(${t.id})">Confirmar</button>
      </div>`:''}
    </div>`;
  }).join('');
}

// ── DIARY ─────────────────────────────────────────────────────────────────────
function renderDiary() {
  const el = document.getElementById('diary-list');
  const closed = S.trades.filter(t=>['win','loss','manual'].includes(t.status));
  if (!closed.length) {
    el.innerHTML = '<div class="empty-state">Nenhum trade fechado ainda.<br>Registre o resultado no Dashboard.</div>';
    return;
  }
  el.innerHTML = closed.map(t => {
    const isL = t.dir==='LONG';
    const base = t.sym.replace('USDT','');
    const gc   = {S:'var(--gold)',A:'var(--orange)',B:'var(--blue)'}[t.grade];
    const plColor = (t.plUsd||0)>=0?'var(--green)':'var(--red)';
    const rColor  = (t.rResult||0)>=0?'var(--green)':'var(--red)';
    const sBadge  = t.status==='win' ? 'sb-win' : t.status==='loss' ? 'sb-loss' : 'sb-manual';
    const sLabel  = t.status==='win' ? '✅ WIN' : t.status==='loss' ? '🛑 LOSS' : '📝 MANUAL';
    return `
    <div class="diary-card">
      <div class="dc-top">
        <div style="display:flex;align-items:center;gap:7px">
          <span class="dc-sym">${base}/USDT</span>
          <span style="color:${isL?'var(--green)':'var(--red)'};font-size:11px;font-weight:700">${t.dir}</span>
          <span style="color:${gc};font-size:11px;font-weight:700">G${t.grade}</span>
          <span class="status-badge ${sBadge}">${sLabel}</span>
        </div>
        <span class="dc-date">${t.closedAt||t.date}</span>
      </div>
      <div class="dc-stats">
        <span class="k">Entrada</span><span class="v">${fmt(t.entry)}</span>
        <span class="k">Stop</span><span class="v" style="color:var(--red)">${fmt(t.stop)}</span>
        <span class="k">TP1</span><span class="v" style="color:var(--green)">${fmt(t.tp1)}</span>
        <span class="k">Risco</span><span class="v" style="color:var(--orange)">${fmtU(t.risk)}</span>
      </div>
      <div class="dc-pl">
        <span class="dc-date">${t.closedNote||''}</span>
        <div style="text-align:right">
          <div class="plr" style="color:${rColor}">${(t.rResult>=0?'+':'') + (t.rResult||0).toFixed(2)}R</div>
          <div class="plusd" style="color:${plColor}">${(t.plUsd>=0?'+':'') + fmtU(t.plUsd||0)}</div>
        </div>
      </div>
    </div>`;
  }).join('');
}

function clearDiary() {
  if (!confirm('Apagar todo o histórico?')) return;
  S.trades = []; persist(); renderDash(); renderDiary();
}

function exportDiaryCsv() {
  const closed = S.trades.filter(t => ['win','loss','manual'].includes(t.status));
  if (!closed.length) { alert('Nenhum trade fechado para exportar.'); return; }
  const header = ['data','simbolo','direcao','entrada','stop','tp_parcial','tp_total','resultado','notas'];
  const rows = closed.map(t => [
    t.closedAt || t.date || '',
    (t.sym || '').replace('USDT','') + '/USDT',
    t.dir || '',
    (t.entry || '').toString(),
    (t.stop  || '').toString(),
    (t.tp1   || '').toString(),
    (t.tpF   || '').toString(),
    (t.rResult != null ? (t.rResult >= 0 ? '+' : '') + t.rResult.toFixed(2) + 'R' : ''),
    (t.closedNote || '').replace(/;/g, ','),
  ]);
  const csv = [header, ...rows].map(r => r.map(v => `"${v}"`).join(';')).join('\n');
  const today = new Date().toISOString().slice(0, 10);
  const filename = `diario_trades_${today}.csv`;
  const blob = new Blob(['﻿' + csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
}

// ── TABS ──────────────────────────────────────────────────────────────────────
function showTab(name) {
  ['sinal','dash','diario'].forEach(t => {
    document.getElementById('tab-'+t).style.display = t===name?'':'none';
  });
  document.querySelectorAll('.tab').forEach((el,i) => {
    el.classList.toggle('on', ['sinal','dash','diario'][i]===name);
  });
  if (name==='dash') { renderDash(); }
  if (name==='diario') { renderDiary(); }
}

init();

// ── PWA ───────────────────────────────────────────────────────────────────────
let _deferredPrompt = null;

// Captura o evento de instalação (Android/Chrome)
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  _deferredPrompt = e;
  document.getElementById('install-btn').style.display = 'block';
});

async function installApp() {
  if (!_deferredPrompt) return;
  _deferredPrompt.prompt();
  const { outcome } = await _deferredPrompt.userChoice;
  if (outcome === 'accepted') {
    document.getElementById('install-btn').style.display = 'none';
  }
  _deferredPrompt = null;
}

// Esconde o botão se já estiver instalado
window.addEventListener('appinstalled', () => {
  document.getElementById('install-btn').style.display = 'none';
});

// iOS: mostra banner se for Safari no iPhone e não estiver em standalone
const isIos = /iphone|ipad|ipod/i.test(navigator.userAgent);
const isStandalone = window.matchMedia('(display-mode: standalone)').matches
  || window.navigator.standalone;
if (isIos && !isStandalone) {
  document.getElementById('ios-banner').style.display = 'block';
}

// Registra service worker para funcionar offline
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
