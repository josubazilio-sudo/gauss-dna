<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>GAUSS+DNA Backtest Viewer</title>
<script src="https://unpkg.com/lightweight-charts@4.2.0/dist/lightweight-charts.standalone.production.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#131722;color:#d1d4dc;font-family:'Segoe UI',system-ui,sans-serif;font-size:13px;height:100dvh;display:flex;flex-direction:column;overflow:hidden}

header{background:#1e222d;border-bottom:1px solid #2a2e39;padding:10px 16px;display:flex;align-items:center;gap:12px;flex-shrink:0;flex-wrap:wrap}
header h1{font-size:15px;font-weight:700;color:#fff;letter-spacing:.5px}
header h1 span{color:#26a69a}
.meta-info{color:#848994;font-size:11px;display:flex;gap:12px;align-items:center;flex-wrap:wrap}
.meta-sym{color:#fff;font-weight:700;font-size:14px}
.meta-badge{background:#2a2e39;padding:2px 7px;border-radius:3px;font-size:11px}
.ema-toggles{display:flex;gap:8px;margin-left:auto;flex-wrap:wrap}
.ema-toggle{display:flex;align-items:center;gap:4px;cursor:pointer;padding:4px 8px;border-radius:3px;border:1px solid transparent;transition:border-color .15s;font-size:11px}
.ema-toggle:hover{border-color:#3d4250}
.ema-toggle input{display:none}
.ema-dot{width:10px;height:3px;border-radius:2px;flex-shrink:0}
.ema-toggle.off{opacity:.35}

#chart-wrap{flex:1;min-height:0;position:relative}
#chart{width:100%;height:100%}
#loading{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(19,23,34,.92);z-index:10;font-size:14px;color:#848994;gap:10px;flex-direction:column}
#loading.hide{display:none}
.spinner{width:28px;height:28px;border:2px solid #2a2e39;border-top-color:#26a69a;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#load-msg{font-size:13px;color:#848994}
#error-msg{color:#ef5350;font-size:14px;text-align:center;padding:0 20px;max-width:400px;line-height:1.6}

#stats-bar{background:#1e222d;border-top:1px solid #2a2e39;border-bottom:1px solid #2a2e39;padding:8px 16px;display:flex;gap:20px;flex-shrink:0;flex-wrap:wrap}
.stat{display:flex;flex-direction:column;gap:2px}
.stat-label{color:#848994;font-size:10px;text-transform:uppercase;letter-spacing:.5px}
.stat-value{font-size:16px;font-weight:700}
.green{color:#26a69a} .red{color:#ef5350} .orange{color:#ff9800} .white{color:#fff}
.grade-badges{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.badge{padding:2px 7px;border-radius:3px;font-size:11px;font-weight:600}
.badge-s{background:#ffd70020;color:#ffd700;border:1px solid #ffd70050}
.badge-a{background:#ff980020;color:#ff9800;border:1px solid #ff980050}
.badge-b{background:#2196f320;color:#2196f3;border:1px solid #2196f350}
.source-tags{display:flex;gap:5px;flex-wrap:wrap;align-items:center}
.src-tag{padding:1px 6px;border-radius:3px;font-size:10px;background:#2a2e39;color:#848994}

#table-wrap{overflow-y:auto;flex-shrink:0;max-height:200px;border-top:1px solid #2a2e39}
table{width:100%;border-collapse:collapse;font-size:11px}
thead{position:sticky;top:0;background:#1e222d;z-index:1}
th{padding:6px 10px;text-align:left;color:#848994;font-weight:600;border-bottom:1px solid #2a2e39;white-space:nowrap}
td{padding:5px 10px;border-bottom:1px solid #1e222d;white-space:nowrap}
tr:hover td{background:#1e222d;cursor:pointer}
.dir-long{color:#26a69a;font-weight:700} .dir-short{color:#ef5350;font-weight:700}
.r-pos{color:#26a69a;font-weight:600} .r-neg{color:#ef5350;font-weight:600} .r-neutral{color:#ff9800;font-weight:600}
.outcome-badge{padding:1px 6px;border-radius:3px;font-size:10px;font-weight:600}
.oc-full{background:#26a69a20;color:#26a69a;border:1px solid #26a69a40}
.oc-stop{background:#ef535020;color:#ef5350;border:1px solid #ef535040}
.oc-timeout{background:#ff980020;color:#ff9800;border:1px solid #ff980040}
.oc-partial{background:#2196f320;color:#2196f3;border:1px solid #2196f340}
.grade-s{color:#ffd700;font-weight:700} .grade-a{color:#ff9800;font-weight:700} .grade-b{color:#2196f3;font-weight:700}

@media(max-width:600px){
  #stats-bar{gap:12px}
  .stat-value{font-size:14px}
  header{padding:8px 12px;gap:8px}
  .ema-toggles{display:none}
  #table-wrap{max-height:160px}
}
</style>
</head>
<body>

<header>
  <h1>GAUSS<span>+DNA</span></h1>
  <div class="meta-info">
    <span class="meta-sym" id="meta-sym">—</span>
    <span class="meta-badge" id="meta-tf">—</span>
    <span class="meta-badge" id="meta-months">—</span>
    <span style="color:#505560" id="meta-date">Carregando...</span>
  </div>
  <div class="ema-toggles">
    <label class="ema-toggle" id="tog10" onclick="toggleEma('ema10')">
      <span class="ema-dot" style="background:#7b61ff"></span><span>EMA10</span>
    </label>
    <label class="ema-toggle" id="tog21" onclick="toggleEma('ema21')">
      <span class="ema-dot" style="background:#ff9800"></span><span>EMA21</span>
    </label>
    <label class="ema-toggle" id="tog50" onclick="toggleEma('ema50')">
      <span class="ema-dot" style="background:#2196f3"></span><span>EMA50</span>
    </label>
    <label class="ema-toggle" id="tog200" onclick="toggleEma('ema200')">
      <span class="ema-dot" style="background:#9c27b0"></span><span>EMA200</span>
    </label>
  </div>
</header>

<div id="chart-wrap">
  <div id="chart"></div>
  <div id="loading">
    <div class="spinner"></div>
    <span id="load-msg">Carregando resultados...</span>
    <span id="error-msg" style="display:none"></span>
  </div>
</div>

<div id="stats-bar">
  <div class="stat"><span class="stat-label">Trades</span><span class="stat-value white" id="st-total">—</span></div>
  <div class="stat"><span class="stat-label">Win Rate</span><span class="stat-value" id="st-wr">—</span></div>
  <div class="stat"><span class="stat-label">R Médio</span><span class="stat-value" id="st-avgr">—</span></div>
  <div class="stat"><span class="stat-label">R Total</span><span class="stat-value" id="st-totalr">—</span></div>
  <div class="stat">
    <span class="stat-label">Por Grade</span>
    <div class="grade-badges" id="st-grades"></div>
  </div>
  <div class="stat">
    <span class="stat-label">Por Tipo</span>
    <div class="source-tags" id="st-sources"></div>
  </div>
</div>

<div id="table-wrap">
  <table id="trade-table">
    <thead>
      <tr>
        <th>#</th><th>Data/Hora</th><th>Dir</th><th>Tipo</th><th>Grade</th>
        <th>Score</th><th>RSI</th><th>ADX</th><th>Trend</th>
        <th>R resultado</th><th>TP1</th><th>TP2</th><th>Final</th><th>Stop</th><th>Resultado</th>
      </tr>
    </thead>
    <tbody id="trade-body"></tbody>
  </table>
</div>

<script>
let chart, candleSeries;
const emaLines = {};
const emaVis   = {ema10:true, ema21:true, ema50:true, ema200:true};
const emaCfg   = {
  ema10:  {color:'#7b61ff', lineWidth:1},
  ema21:  {color:'#ff9800', lineWidth:1},
  ema50:  {color:'#2196f3', lineWidth:1},
  ema200: {color:'#9c27b0', lineWidth:2},
};

function initChart() {
  const wrap = document.getElementById('chart-wrap');
  chart = LightweightCharts.createChart(document.getElementById('chart'), {
    width:  wrap.clientWidth,
    height: wrap.clientHeight,
    layout: {background:{color:'#131722'}, textColor:'#d1d4dc'},
    grid:   {vertLines:{color:'#2a2e3940'}, horzLines:{color:'#2a2e3940'}},
    crosshair: {mode: LightweightCharts.CrosshairMode.Normal},
    rightPriceScale: {borderColor:'#2a2e39'},
    timeScale: {borderColor:'#2a2e39', timeVisible:true, secondsVisible:false},
  });
  candleSeries = chart.addCandlestickSeries({
    upColor:'#26a69a', downColor:'#ef5350',
    borderVisible:false, wickUpColor:'#26a69a', wickDownColor:'#ef5350',
  });
  Object.entries(emaCfg).forEach(([key, cfg]) => {
    emaLines[key] = chart.addLineSeries({...cfg, priceLineVisible:false, lastValueVisible:false, crosshairMarkerVisible:false});
  });
  window.addEventListener('resize', () => chart.resize(wrap.clientWidth, wrap.clientHeight));
}

function toggleEma(key) {
  emaVis[key] = !emaVis[key];
  document.getElementById('tog' + key.replace('ema','')).classList.toggle('off', !emaVis[key]);
  if (emaLines[key]) emaLines[key].applyOptions({visible: emaVis[key]});
}

function renderAll(data) {
  candleSeries.setData(data.candles);
  Object.entries(data.indicators).forEach(([k, v]) => {
    if (emaLines[k]) emaLines[k].setData(v);
  });
  candleSeries.setMarkers(data.markers);

  const s = data.stats;
  document.getElementById('st-total').textContent = s.total;
  const wr = document.getElementById('st-wr');
  wr.textContent = s.win_rate + '%';
  wr.className = 'stat-value ' + (s.win_rate >= 55 ? 'green' : s.win_rate >= 45 ? 'orange' : 'red');
  const ar = document.getElementById('st-avgr');
  ar.textContent = (s.avg_r > 0 ? '+' : '') + s.avg_r + 'R';
  ar.className = 'stat-value ' + (s.avg_r > 0 ? 'green' : 'red');
  const tr = document.getElementById('st-totalr');
  tr.textContent = (s.total_r > 0 ? '+' : '') + s.total_r + 'R';
  tr.className = 'stat-value ' + (s.total_r > 0 ? 'green' : 'red');

  const gradeHtml = ['S','A','B'].map(g => {
    const gd = s.by_grade[g];
    if (!gd) return '';
    const gwr = gd.total ? Math.round(gd.wins/gd.total*100) : 0;
    return `<span class="badge badge-${g.toLowerCase()}" title="${gd.total} trades · ${gwr}% WR · ${gd.r>0?'+':''}${gd.r}R">
              ${g}: ${gd.total} (${gwr}%)
            </span>`;
  }).join('');
  document.getElementById('st-grades').innerHTML = gradeHtml;

  const srcHtml = Object.entries(s.by_source).map(([src, sd]) => {
    const swr = sd.total ? Math.round(sd.wins/sd.total*100) : 0;
    return `<span class="src-tag" title="${sd.total} trades · ${swr}% WR · ${sd.r>0?'+':''}${sd.r}R">
              ${src} ${sd.total}
            </span>`;
  }).join('');
  document.getElementById('st-sources').innerHTML = srcHtml;

  const tbody = document.getElementById('trade-body');
  tbody.innerHTML = data.trades.map((t, i) => {
    const rCls = t.r_result > 0 ? 'r-pos' : t.r_result < 0 ? 'r-neg' : 'r-neutral';
    const rStr = (t.r_result > 0 ? '+' : '') + t.r_result + 'R';
    const oc = t.outcome;
    const ocCls = oc === 'FULL_TP' ? 'oc-full' : oc.includes('STOP') ? 'oc-stop' : oc.includes('TIMEOUT') ? 'oc-timeout' : 'oc-partial';
    const ocLabel = oc === 'FULL_TP' ? '✅ Full TP' : oc === 'STOP' ? '🛑 Stop' : oc === 'STOP_AFTER_TP1' ? '⚡ Stop/TP1' : oc === 'STOP_AFTER_TP2' ? '⚡ Stop/TP2' : '⏱ Timeout';
    const ts = t.ts * 1000;
    return `<tr onclick="goToBar(${t.ts})">
      <td>${i+1}</td>
      <td>${t.datetime}</td>
      <td class="${t.sig==='LONG'?'dir-long':'dir-short'}">${t.sig}</td>
      <td>${t.source}</td>
      <td class="grade-${t.grade.toLowerCase()}">${t.grade}</td>
      <td>${t.score}</td>
      <td>${t.rsi}</td>
      <td>${t.adx}</td>
      <td>${t.trend}</td>
      <td class="${rCls}">${rStr}</td>
      <td>${t.tp1_hit?'✓':'—'}</td>
      <td>${t.tp2_hit?'✓':'—'}</td>
      <td>${t.final_hit?'✓':'—'}</td>
      <td>${t.stop_hit?'✓':'—'}</td>
      <td><span class="outcome-badge ${ocCls}">${ocLabel}</span></td>
    </tr>`;
  }).join('');

  chart.timeScale().fitContent();
}

function goToBar(ts) {
  chart.timeScale().scrollToPosition(0, false);
  candleSeries.setMarkers(candleSeries.markers());
  chart.timeScale().scrollToRealTime();
}

async function loadData() {
  initChart();
  const jsonUrl = './results/latest.json';
  try {
    const resp = await fetch(jsonUrl);
    if (!resp.ok) throw new Error(`HTTP ${resp.status} — arquivo não encontrado.\n\nRode o workflow "GAUSS+DNA Backtest" no GitHub Actions primeiro.`);
    const data = await resp.json();

    document.getElementById('meta-sym').textContent    = data.symbol;
    document.getElementById('meta-tf').textContent     = (data.interval || '1h').toUpperCase();
    document.getElementById('meta-months').textContent = (data.months || '?') + ' meses';
    document.getElementById('meta-date').textContent   = 'Gerado: ' + (data.generated || '—');

    document.getElementById('loading').classList.add('hide');
    renderAll(data);
  } catch(e) {
    const err = document.getElementById('error-msg');
    const spinner = document.querySelector('.spinner');
    const msg = document.getElementById('load-msg');
    spinner.style.display = 'none';
    msg.style.display = 'none';
    err.style.display = 'block';
    err.innerHTML = '❌ ' + e.message.replace(/\n/g, '<br>') +
      '<br><br><a href="https://github.com/josubazilio-sudo/gauss-dna/actions" style="color:#26a69a;text-decoration:none">→ Abrir GitHub Actions</a>';
  }
}

window.addEventListener('DOMContentLoaded', loadData);
</script>
</body>
</html>
