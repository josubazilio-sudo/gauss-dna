<script>
// ── INDICADORES ──────────────────────────────────────────────────────────────
function ema(arr,p){const k=2/(p+1);let v=arr[0];const o=[v];for(let i=1;i<arr.length;i++){v=arr[i]*k+v*(1-k);o.push(v);}return o;}
function rma(arr,p){let v=arr.slice(0,p).reduce((a,b)=>a+b,0)/p;const o=[v];for(let i=p;i<arr.length;i++){v=(v*(p-1)+arr[i])/p;o.push(v);}return o;}

function macdCalc(closes){
  const ea=ema(closes,12),eb=ema(closes,26);
  const ml=ea.map((v,i)=>v-eb[i]);
  const sl=ema(ml,9);
  const hist=ml.map((v,i)=>v-sl[i]);
  const n=hist.length;
  return{ml:ml[n-1],sl:sl[n-1],hist:hist[n-1],histP:hist[n-2]||hist[n-1]};
}

function rsiCalc(closes,p=14){
  let ag=0,al=0;
  for(let i=1;i<=p;i++){const d=closes[i]-closes[i-1];ag+=Math.max(d,0);al+=Math.max(-d,0);}
  ag/=p;al/=p;
  for(let i=p+1;i<closes.length;i++){const d=closes[i]-closes[i-1];ag=(ag*(p-1)+Math.max(d,0))/p;al=(al*(p-1)+Math.max(-d,0))/p;}
  return al===0?100:100-(100/(1+ag/al));
}

function adxCalc(candles,p=14){
  const pdm=[],mdm=[],tr=[];
  for(let i=1;i<candles.length;i++){
    const h=candles[i].h,l=candles[i].l,ph=candles[i-1].h,pl=candles[i-1].l,pc=candles[i-1].c;
    const up=h-ph,dn=pl-l;
    pdm.push(up>dn&&up>0?up:0);mdm.push(dn>up&&dn>0?dn:0);
    tr.push(Math.max(h-l,Math.abs(h-pc),Math.abs(l-pc)));
  }
  const rtr=rma(tr,p),rpdm=rma(pdm,p),rmdm=rma(mdm,p);
  const dx=rtr.map((t,i)=>{const tt=t||1e-10;const pdi=(rpdm[i]/tt)*100,mdi=(rmdm[i]/tt)*100;return Math.abs(pdi-mdi)/(pdi+mdi||1)*100;});
  const adxArr=rma(dx,p);
  const idx=adxArr.length-1,t=rtr[idx]||1e-10;
  return{adx:adxArr[idx],pdi:(rpdm[idx]/t)*100,mdi:(rmdm[idx]/t)*100};
}

function atrCalc(candles,p=14){
  const tr=[candles[0].h-candles[0].l];
  for(let i=1;i<candles.length;i++){const h=candles[i].h,l=candles[i].l,pc=candles[i-1].c;tr.push(Math.max(h-l,Math.abs(h-pc),Math.abs(l-pc)));}
  return rma(tr,p).at(-1);
}

function haCalc(candles){
  // Heikin-Ashi series — returns last two HA candles
  let ho=(candles[0].o+candles[0].c)/2;
  let hc=(candles[0].o+candles[0].h+candles[0].l+candles[0].c)/4;
  const ha=[{o:ho,c:hc,h:Math.max(candles[0].h,ho,hc),l:Math.min(candles[0].l,ho,hc)}];
  for(let i=1;i<candles.length;i++){
    const po=ha[i-1].o,pc=ha[i-1].c;
    const no=(po+pc)/2;
    const nc=(candles[i].o+candles[i].h+candles[i].l+candles[i].c)/4;
    ha.push({o:no,c:nc,h:Math.max(candles[i].h,no,nc),l:Math.min(candles[i].l,no,nc)});
  }
  return ha;
}

function obvCalc(closes,vols){
  let obv=0;const arr=[0];
  for(let i=1;i<closes.length;i++){
    if(closes[i]>closes[i-1])obv+=vols[i];
    else if(closes[i]<closes[i-1])obv-=vols[i];
    arr.push(obv);
  }
  return arr;
}

function fmtP(v){
  if(v<0.0001)return v.toFixed(7);
  if(v<0.01)return v.toFixed(5);
  if(v<1)return v.toFixed(4);
  if(v<100)return v.toFixed(3);
  return v.toLocaleString('en',{minimumFractionDigits:2,maximumFractionDigits:2});
}

// ── ANÁLISE ──────────────────────────────────────────────────────────────────
let lastResult=null;

function analyze(candles){
  const closes=candles.map(c=>c.c);
  const vols=candles.map(c=>c.v);
  const n=closes.length;
  const price=closes[n-1];

  const e10=ema(closes,10).at(-1);
  const e21=ema(closes,21).at(-1);
  const e50=ema(closes,50).at(-1);
  const e200=ema(closes,200).at(-1);
  const e200p=ema(closes.slice(0,-5),200).at(-1);

  const{ml,sl,hist,histP}=macdCalc(closes);
  const rsiV=rsiCalc(closes.slice(-50));
  const{adx,pdi,mdi}=adxCalc(candles.slice(-60));
  const atrV=atrCalc(candles.slice(-20));

  const avgVol=vols.slice(-20).reduce((a,b)=>a+b,0)/20;
  const lastC=candles[n-1];
  const sp=Math.max(lastC.h-lastC.l,1e-10);
  const flow=((lastC.c-lastC.o)/sp)*lastC.v;

  // Heikin-Ashi
  const ha=haCalc(candles);
  const haLast=ha[ha.length-1],haPrev=ha[ha.length-2];
  const haBull=haLast.c>haLast.o&&haPrev.c>haPrev.o;
  const haBear=haLast.c<haLast.o&&haPrev.c<haPrev.o;

  // OBV trend (EMA of OBV rising/falling)
  const obvArr=obvCalc(closes,vols);
  const obvEma=ema(obvArr,14);
  const obvBull=obvEma[obvEma.length-1]>obvEma[obvEma.length-4];
  const obvBear=obvEma[obvEma.length-1]<obvEma[obvEma.length-4];

  // Base conditions
  const tBull=price>e200&&e10>e21&&e21>e50;
  const tBear=price<e200&&e10<e21&&e21<e50;
  const mBull=ml>sl&&hist>histP;
  const mBear=ml<sl&&hist<histP;
  const adxOk=adx>18;
  const vStrong=vols[n-1]>avgVol;
  const fBull=flow>0,fBear=flow<0;
  const e200Rising=e200>e200p;
  const rsiBull=rsiV>45&&rsiV<70;
  const rsiBear=rsiV<55&&rsiV>30;
  const notExtLong=rsiV<75;
  const notExtShort=rsiV>25;

  let score=
    (tBull?35:tBear?-35:0)+
    (mBull?20:mBear?-20:0)+
    (rsiBull?10:rsiBear?-10:0)+
    (vStrong?10:-10)+
    (adxOk?15:-15)+
    (fBull?20:fBear?-20:0)+
    (e200Rising?10:-10)+
    (adxOk?10:-10);
  score=Math.max(-145,Math.min(145,score));

  // Signal (MACD or HA; volume or OBV; RSI extreme block)
  let sig=null;
  if(score>30&&tBull&&(mBull||haBull)&&adxOk&&(vStrong||obvBull)&&notExtLong) sig='LONG';
  else if(score<-30&&tBear&&(mBear||haBear)&&adxOk&&(vStrong||obvBear)&&notExtShort) sig='SHORT';

  // Signal grade based on confirmations
  let grade='B',gradeConfs=0;
  if(sig==='LONG'){
    if(mBull)gradeConfs++;
    if(haBull)gradeConfs++;
    if(obvBull)gradeConfs++;
    if(adx>25)gradeConfs++;
    if(rsiV>50&&rsiV<65)gradeConfs++;
    if(e200Rising)gradeConfs++;
  }else if(sig==='SHORT'){
    if(mBear)gradeConfs++;
    if(haBear)gradeConfs++;
    if(obvBear)gradeConfs++;
    if(adx>25)gradeConfs++;
    if(rsiV<50&&rsiV>35)gradeConfs++;
    if(!e200Rising)gradeConfs++;
  }
  if(gradeConfs>=5)grade='S';
  else if(gradeConfs>=3)grade='A';
  else grade='B';

  // TP ratios by grade
  const ratios={S:[2,3.5,6],A:[1.8,2.8,5],B:[1.5,2.5,4]};
  const[r1,r2,r3]=ratios[grade];

  // Stop: swing low/high of last 5 candles with ATR buffer
  const isL=sig==='LONG'||(!sig&&score>0);
  const last5=candles.slice(-6,-1);
  const swingLow=Math.min(...last5.map(c=>c.l));
  const swingHigh=Math.max(...last5.map(c=>c.h));
  const stop=isL?Math.min(swingLow-atrV*0.3,price-atrV*1.5)
                :Math.max(swingHigh+atrV*0.3,price+atrV*1.5);
  const risk=Math.abs(price-stop);
  const tp1=isL?price+risk*r1:price-risk*r1;
  const tp2=isL?price+risk*r2:price-risk*r2;
  const tp3=isL?price+risk*r3:price-risk*r3;

  return{
    sig,grade,gradeConfs,score,price,rsiV,adx,atrV,stop,tp1,tp2,tp3,risk,r1,r2,r3,
    haBull,haBear,obvBull,obvBear,mBull,mBear,vStrong,
    filters:{
      'tBull':tBull,'tBear':tBear,
      'MACD':mBull?true:(mBear?null:false),
      'Heikin-Ashi':haBull?true:(haBear?null:false),
      'ADX>18':adxOk,
      'Volume':vStrong,
      'OBV':obvBull?true:(obvBear?null:false),
      'Flow':fBull?true:(fBear?null:false),
      'RSI zona':rsiBull?true:(rsiBear?null:false),
      'e200 ↑':e200Rising,
    }
  };
}

// ── UI ───────────────────────────────────────────────────────────────────────
function log(msg,cls=''){
  const d=document.getElementById('log');
  const s=document.createElement('span');
  s.className=cls;s.textContent=msg;
  d.prepend(s);
  while(d.children.length>30)d.removeChild(d.lastChild);
}

function toast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.style.display='block';
  setTimeout(()=>t.style.display='none',3000);
}

async function runTest(){
  const sym=document.getElementById('sym').value;
  const tf=document.getElementById('tf').value;
  const btn=document.getElementById('btnRun');
  btn.disabled=true;btn.textContent='⏳ Buscando...';
  log(`Buscando ${sym} [${tf}]...`,'info');

  try{
    const ctrl=new AbortController();
    const tid=setTimeout(()=>ctrl.abort(),12000);
    const url=`https://api.binance.com/api/v3/klines?symbol=${sym}&interval=${tf}&limit=250`;
    const r=await fetch(url,{signal:ctrl.signal});
    clearTimeout(tid);
    const data=await r.json();
    if(!Array.isArray(data)||data.length<60){log('Dados insuficientes','warn');return;}
    const candles=data.map(k=>({o:+k[1],h:+k[2],l:+k[3],c:+k[4],v:+k[5]}));

    const res=analyze(candles);
    lastResult={...res,sym,tf,label:document.getElementById('sym').selectedOptions[0].text};
    showResult(lastResult);
    log(`✓ ${sym} | Score ${res.score>0?'+':''}${res.score} | ${res.sig||'Sem sinal'}`,res.sig?'ok':'');
  }catch(e){
    log('Erro: '+e.message,'err');
    toast('❌ Erro ao buscar dados');
  }finally{
    btn.disabled=false;btn.textContent='🔍 Analisar';
  }
}

function showResult(res){
  document.getElementById('result').style.display='block';

  const box=document.getElementById('sigBox');
  const sigEl=document.getElementById('sigType');
  const coinEl=document.getElementById('sigCoin');

  const gradeColor={S:'#ffcc44',A:'#00e090',B:'#3b9eff'};
  const gc=res.sig?gradeColor[res.grade]:'#5a6d8a';

  if(res.sig==='LONG'){
    box.className='sig-box long';
    sigEl.innerHTML=`<span style="color:#00e090">🟢 SINAL LONG</span> <span style="color:${gc};font-size:.8rem;margin-left:.5rem">[${res.grade}]</span>`;
  }else if(res.sig==='SHORT'){
    box.className='sig-box short';
    sigEl.innerHTML=`<span style="color:#ff3d5a">🔴 SINAL SHORT</span> <span style="color:${gc};font-size:.8rem;margin-left:.5rem">[${res.grade}]</span>`;
  }else{
    box.className='sig-box none';
    sigEl.innerHTML='<span style="color:#5a6d8a">— Sem Sinal</span>';
  }
  coinEl.textContent=res.label+' · '+res.tf+(res.sig?` · ${res.gradeConfs}/6 confs`:'');

  const sc=document.getElementById('rScore');
  sc.textContent=(res.score>0?'+':'')+res.score;
  sc.className='metric-val '+(res.score>30?'green':res.score<-30?'red':'yellow');

  const ri=document.getElementById('rRsi');
  ri.textContent=res.rsiV.toFixed(1);
  ri.className='metric-val '+(res.rsiV>70?'red':res.rsiV<30?'red':res.rsiV>50?'green':'yellow');

  const ad=document.getElementById('rAdx');
  ad.textContent=res.adx.toFixed(1);
  ad.className='metric-val '+(res.adx>25?'green':res.adx>18?'yellow':'muted');

  document.getElementById('rPrice').textContent='$'+fmtP(res.price);

  // Filtros (null = neutral, shown as warning)
  const fd=document.getElementById('filters');
  fd.innerHTML=Object.entries(res.filters).map(([k,v])=>{
    const cls=v===true?'ok':v===false?'fail':'fail';
    const icon=v===true?'✓':v===null?'~':'✗';
    return`<div class="flt ${cls}">${icon} ${k}</div>`;
  }).join('');

  // TPs with dynamic ratios by grade
  const tpData=[
    {n:'Stop',p:res.stop,rr:null,col:'#ff3d5a'},
    {n:`TP1 (${res.r1}R)`,p:res.tp1,rr:res.r1,col:'#3b9eff'},
    {n:`TP2 (${res.r2}R)`,p:res.tp2,rr:res.r2,col:'#00d4c8'},
    {n:`TP3 (${res.r3}R)`,p:res.tp3,rr:res.r3,col:'#00e090'},
  ];
  document.getElementById('tpBody').innerHTML=tpData.map(t=>`
    <tr>
      <td style="color:${t.col}">${t.n}</td>
      <td>$${fmtP(t.p)}</td>
      <td style="color:${t.col}">${t.rr?t.rr+'R':'—'}</td>
    </tr>
  `).join('');
}

// ── TELEGRAM ─────────────────────────────────────────────────────────────────
async function sendTelegram(){
  const tok=document.getElementById('tgToken').value.trim();
  const cid=document.getElementById('tgChatId').value.trim();
  if(!tok||!cid){toast('⚠️ Configure Token e Chat ID');return;}
  if(!lastResult){toast('⚠️ Execute uma análise primeiro');return;}

  const r=lastResult;
  const isL=r.sig==='LONG'||(!r.sig&&r.score>0);
  const sigType=r.sig||(isL?'LONG':'SHORT');

  function esc(v){return String(v).replace(/[_*[\]()~`>#+=|{}.!\\-]/g,'\\$&');}

  const gradeLabel={S:'⭐ S — Premium',A:'🔷 A — Alta',B:'🔹 B — Normal'};
  const gl=r.sig?gradeLabel[r.grade]||r.grade:'—';
  const r1e=esc(r.r1||1.5),r2e=esc(r.r2||2.5),r3e=esc(r.r3||5);
  const confs=[];
  if(isL){if(r.mBull)confs.push('MACD');if(r.haBull)confs.push('HA');if(r.obvBull)confs.push('OBV');}
  else{if(r.mBear)confs.push('MACD');if(r.haBear)confs.push('HA');if(r.obvBear)confs.push('OBV');}
  const confStr=confs.length?esc(confs.join(' \\+ ')):'—';

  const text=
    `🚨 *GAUSS\\+DNA — SINAL ${sigType}*\n\n`+
    `${isL?'🟢':'🔴'} *${esc(r.label)}* \\| ⏱ ${esc(r.tf)}\n`+
    `🏅 Grau: *${esc(gl)}* \\(${esc(r.gradeConfs||0)}/6\\)\n`+
    `📡 Conf: ${confStr}\n\n`+
    `💰 Entrada: \`$${esc(fmtP(r.price))}\`\n`+
    `🛑 Stop \\(swing\\): \`$${esc(fmtP(r.stop))}\`\n`+
    `🎯 TP1 \\(${r1e}R\\): \`$${esc(fmtP(r.tp1))}\`\n`+
    `✨ TP2 \\(${r2e}R\\): \`$${esc(fmtP(r.tp2))}\`\n`+
    `🏆 TP3 \\(${r3e}R\\): \`$${esc(fmtP(r.tp3))}\`\n\n`+
    `📊 Score: *${esc(r.score)}/145* \\| RSI: ${esc(r.rsiV.toFixed(0))} \\| ADX: ${esc(r.adx.toFixed(0))}\n`+
    `⏰ ${esc(new Date().toLocaleString('pt-BR'))}`;

  const btn=document.getElementById('btnSend');
  btn.disabled=true;btn.textContent='⏳ Enviando...';
  try{
    const res=await fetch(`https://api.telegram.org/bot${tok}/sendMessage`,{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({chat_id:cid,text,parse_mode:'MarkdownV2'})
    });
    const d=await res.json();
    if(d.ok){toast('✅ Enviado no Telegram!');log('✓ Telegram OK','ok');}
    else{toast('❌ '+d.description);log('Telegram erro: '+d.description,'err');}
  }catch(e){toast('❌ Erro de rede');log('Erro: '+e.message,'err');}
  finally{btn.disabled=false;btn.textContent='📲 Enviar no Telegram';}
}

// Carrega config salva
try{
  const tok=localStorage.getItem('tg_token'),cid=localStorage.getItem('tg_chatid');
  if(tok)document.getElementById('tgToken').value=tok;
  if(cid)document.getElementById('tgChatId').value=cid;
}catch(e){}

// Salva config ao digitar
document.getElementById('tgToken').addEventListener('input',function(){try{localStorage.setItem('tg_token',this.value);}catch(e){}});
document.getElementById('tgChatId').addEventListener('input',function(){try{localStorage.setItem('tg_chatid',this.value);}catch(e){}});
</script>
</body>
</html>
